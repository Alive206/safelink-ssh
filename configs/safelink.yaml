# Example sshtunneld configuration.
#
# Anything written as ${VAR} or $VAR is replaced with the matching environment
# variable at load time, so secrets should not be committed to disk.
#
# All durations use Go's time.ParseDuration syntax: e.g. 30s, 1m, 1m30s.

# Application role: server | client | standalone (default)
#   server     — VPN deployment, subscription publishing, server management
#   client     — SSH tunnel connections, VPN client, subscription import
#   standalone — all features enabled (backward compatible)
role: standalone

log_level: info

# Path to the strict-mode known_hosts file.  Must already contain the SSH
# server's fingerprint; seed it once with `ssh-keyscan` before first run.
known_hosts: ~/.ssh/known_hosts

# Set to true to skip host key verification entirely.
# WARNING: only use in trusted networks — disables MITM protection.
insecure_host_key: false

defaults:
  keepalive_interval: 30s
  keepalive_max_fails: 3
  dial_timeout: 10s
  reconnect_initial: 1s
  reconnect_max: 60s

# Embedded web control panel.
web:
  addr: 127.0.0.1:9090
  auth:
    api_token: ""
    users:
      - username: admin
        password_hash: "$2a$12$KXVNZ0McwBWr4kPFkV9cdOILKrYbOw9twEPCsG7htPGHNrEsz6INi"   # password: admin123

# Tunnels can be added via the web UI or by editing this section.
tunnels: []
