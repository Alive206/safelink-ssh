# Phase-2 smoke test config: web panel enabled, no tunnels.
log_level: info
known_hosts: ~/.ssh/known_hosts

defaults:
  keepalive_interval: 30s
  keepalive_max_fails: 3
  dial_timeout: 10s
  reconnect_initial: 1s
  reconnect_max: 60s

web:
  addr: 127.0.0.1:18080
  auth:
    api_token: "smoke-token-12345"
    users:
      - username: admin
        # bcrypt of "changeme" (cost 10).
        password_hash: "$2a$10$rMMLXIP7VGOMWZBud9esL.iYXA/WrBtRABdyFFJMpFtoUSMye6TjC"
