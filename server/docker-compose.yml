services:
  safelink-server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "1562:1562/udp"
      - "8080:8080"
    volumes:
      - safelink-data:/data
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SUBNET=10.0.8.0/24
      - VPN_USER=admin
      - VPN_PASS=changeme
    restart: unless-stopped

volumes:
  safelink-data:
